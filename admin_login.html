<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login — Dolfin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .admin-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .btn-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="login-card mx-auto p-4">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-shield-lock-fill text-secondary" style="font-size: 4rem;"></i>
                </div>
                <h4 class="fw-bold mb-2">Dolfin Admin Portal</h4>
                <span class="admin-badge">
                    <i class="bi bi-shield-check me-1"></i>Admin Access Only
                </span>
            </div>

            <div class="alert alert-warning small" id="alertDemo">
                <i class="bi bi-info-circle me-1"></i>
                <strong>Demo Mode:</strong> Email: <code>admin@dolfin.id</code> / Password: <code>admin123</code>
            </div>

            <form id="adminLoginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="inputEmail" required placeholder="admin@dolfin.id"
                            value="admin@dolfin.id">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="inputPassword" required placeholder="••••••••"
                            value="admin123">
                    </div>
                </div>

                <button type="submit" class="btn btn-admin w-100 py-2 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In as Admin
                </button>

                <div class="text-center">
                    <a href="index.html" class="text-muted small text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Main Portal
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('inputEmail').value;
            const password = document.getElementById('inputPassword').value;

            // Mock authentication
            if (email === 'admin@dolfin.id' && password === 'admin123') {
                // Save admin session
                const adminUser = {
                    role: 'admin',
                    email: 'admin@dolfin.id',
                    name: 'Admin Dolfin'
                };
                localStorage.setItem('dolfin_user', JSON.stringify(adminUser));

                // Redirect to admin dashboard
                window.location.href = 'admin_dashboard.html';
            } else {
                alert('❌ Invalid admin credentials!');
            }
        });
    </script>
</body>

</html>
