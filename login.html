<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — Dolfin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
        }

        .wrap {
            max-width: 560px;
        }

        .brand-badge {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-weight: 800;
            color: #fff;
            background: #0d6efd;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="mx-auto wrap">
            <!-- Header -->
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center gap-2 mb-2">
                    <div class="brand-badge" id="brandBadge">D</div>
                    <div class="text-start">
                        <div class="fw-bold fs-4 lh-1">Dolfin</div>
                        <div class="text-muted" id="portalLabel">Login</div>
                    </div>
                </div>
                <div class="text-muted">Masuk untuk melanjutkan</div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    <!-- Role Info -->
                    <div class="alert alert-light border d-flex justify-content-between align-items-center"
                        role="alert">
                        <div>
                            <div class="fw-semibold">Portal yang dipilih:</div>
                            <div class="text-muted small" id="roleInfo">-</div>
                        </div>
                        <a class="btn btn-sm btn-outline-secondary" href="index.html">Ganti</a>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" class="form-control" type="email" placeholder="user@company.com"
                                autocomplete="username" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label d-flex justify-content-between align-items-center">
                                <span>Password</span>
                                <a href="#" class="small text-decoration-none" data-bs-toggle="modal"
                                    data-bs-target="#forgotModal">
                                    Lupa password?
                                </a>
                            </label>
                            <div class="input-group">
                                <input id="password" class="form-control" type="password" placeholder="••••••••"
                                    autocomplete="current-password" required>
                                <button class="btn btn-outline-secondary" type="button" id="btnTogglePwd">Lihat</button>
                            </div>
                        </div>

                        <div class="form-check my-3">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit" id="btnLogin">Login</button>
                            <button class="btn btn-outline-secondary" type="button" id="btnBack">Kembali</button>
                        </div>

                        <div class="text-muted small mt-3">
                            * Mockup: belum terhubung backend. Redirect berdasarkan role.
                        </div>
                    </form>

                </div>
            </div>

            <div class="text-center text-muted small mt-3">
                © 2026 Dolfin
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-muted small mb-2">
                        Masukkan email Anda. Sistem akan mengirim link reset password.
                    </div>
                    <label class="form-label">Email</label>
                    <input id="forgotEmail" class="form-control" type="email" placeholder="user@company.com">
                    <div class="form-text">Jika email terdaftar, link reset akan dikirim.</div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
                    <button class="btn btn-primary" id="btnSendReset">Kirim Link Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==============================
        // USER DATA MANAGEMENT
        // ==============================
        const LS_USERS = "dolfin_users";
        const DEFAULT_USERS = [
            {
                email: "admin@dolfin.local",
                password: "dolfin123",
                name: "Demo User"
            },
            {
                email: "user@dolfin.local",
                password: "dolfin123",
                name: "Retail & Distributor User"
            }
        ];

        function getUsers() {
            const raw = localStorage.getItem(LS_USERS);
            if (raw) return JSON.parse(raw);
            // Init defaults
            localStorage.setItem(LS_USERS, JSON.stringify(DEFAULT_USERS));
            return DEFAULT_USERS;
        }

        // ==============================
        // ROLE CONFIG
        // ==============================
        const ROLE_CONFIG = {
            retail: {
                name: "Retail Portal",
                desc: "Untuk toko: order, tracking delivery, payment status, iREAP POS summary",
                color: "#0d6efd",
                redirect: "retail_dashboard.html"
            },
            distributor: {
                name: "Distributor Portal",
                desc: "Untuk distributor: kelola catalog, terima order, update delivery & payment",
                color: "#198754",
                redirect: "distributor_dashboard.html"
            },
            admin: {
                name: "Admin Console",
                desc: "Untuk admin: assignment, rules, monitoring transaksi",
                color: "#6c757d",
                redirect: "admin_dashboard.html"
            }
        };

        // ==============================
        // READ ROLE PARAM
        // ==============================
        const params = new URLSearchParams(window.location.search);
        const roleParam = (params.get("role") || "").toLowerCase();
        const role = ROLE_CONFIG[roleParam] ? roleParam : "retail";
        const cfg = ROLE_CONFIG[role];

        // Apply branding
        document.title = `Login — ${cfg.name} | Dolfin`;
        document.getElementById("portalLabel").textContent = cfg.name;
        document.getElementById("roleInfo").textContent = cfg.desc;
        document.getElementById("brandBadge").style.background = cfg.color;

        // ==============================
        // BACK BUTTON
        // ==============================
        document.getElementById("btnBack").addEventListener("click", () => {
            window.location.href = "index.html";
        });

        // ==============================
        // TOGGLE PASSWORD
        // ==============================
        document.getElementById("btnTogglePwd").addEventListener("click", () => {
            const pwd = document.getElementById("password");
            const isPwd = pwd.type === "password";
            pwd.type = isPwd ? "text" : "password";
            document.getElementById("btnTogglePwd").textContent = isPwd ? "Sembunyi" : "Lihat";
        });

        // ==============================
        // LOGIN HANDLER (LOCALSTORAGE)
        // ==============================
        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim().toLowerCase();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Email dan password wajib diisi.");
                return;
            }

            // Check against localStorage users
            const allUsers = getUsers();
            const user = allUsers.find(
                u => u.email === email && u.password === password
            );

            if (!user) {
                alert("Email atau password salah.");
                return;
            }

            // Save session (mock)
            localStorage.setItem("dolfin_user", JSON.stringify({
                email: user.email,
                name: user.name,
                role: role
            }));

            // Redirect by role
            window.location.href = cfg.redirect;
        });

        // ==============================
        // FORGOT PASSWORD (DUMMY)
        // ==============================
        document.getElementById("btnSendReset").addEventListener("click", () => {
            const email = document.getElementById("forgotEmail").value.trim().toLowerCase();
            if (!email) {
                alert("Email wajib diisi.");
                return;
            }

            const exists = DUMMY_USERS.some(u => u.email === email);
            alert(
                exists
                    ? "Link reset password (dummy) berhasil dikirim."
                    : "Jika email terdaftar, link reset password akan dikirim."
            );

            const modalEl = document.getElementById("forgotModal");
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
            document.getElementById("forgotEmail").value = "";
        });
    </script>

</body>

</html>
