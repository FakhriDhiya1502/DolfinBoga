<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Distributor | Forecast List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f6f9; font-family: Arial, Helvetica, sans-serif; }
        .sidebar { min-height: calc(100vh - 56px); }
        .nav-pill { border-radius: 10px; }
        .my-card { border: 0; }
        .muted-xs { font-size: .82rem; color: #6c757d; }

        :root {
            --bg: #f4f6f9;
            --card: #fff;
            --line: #d9e0ea;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --soft: #f8fafc;
        }

        .page {
            padding: 16px;
            background: white; border-radius: 10px; border: 1px solid var(--line);
        }

        .toolbar,
        .my-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        .toolbar {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        button {
            border: 1px solid var(--line);
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .my-card {
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        @media (max-width: 900px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
        }

        .field input,
        .field select {
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 8px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: var(--soft);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-active {
            background: #dcfce7;
            color: #166534;
        }

        .badge-draft {
            background: #e0f2fe;
            color: #0369a1;
        }
    </style>
</head>

<body>
    <!-- Topbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold" href="distributor_dashboard.html">Dolfin</a>
            <span class="navbar-text text-white-50 small d-none d-md-inline">Distributor Portal</span>

            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown"
                        id="userBtn">User</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text small text-muted" id="userInfo">-</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="index.html">Ganti Portal</a></li>
                        <li><button class="dropdown-item text-danger" id="btnLogout">Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="row g-3">
            
            <!-- Sidebar -->
            <div class="col-lg-2" id="sidebar-container"></div>

            <!-- Main -->
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0 text-success fw-bold"><i class="bi bi-graph-up-arrow me-2"></i>Forecast List</h4>
                </div>

                <div class="page shadow-sm">
                    <div class="toolbar">
                        <div><b>Forecast List</b></div>
                        <div>
                            <button class="primary" onclick="window.location.href='distributor_forecast.html'">+ New Forecast</button>
                        </div>
                    </div>

                    <div class="my-card">
                        <div class="form-grid">
                            <div class="field"><label>Store</label><select>
                                    <option>All</option>
                                </select></div>
                            <div class="field"><label>Product Group</label><select>
                                    <option>All</option>
                                </select></div>
                            <div class="field"><label>Status</label><select>
                                    <option>All</option>
                                    <option>Draft</option>
                                    <option>Active</option>
                                </select></div>
                            <div class="field"><label>Updated From</label><input type="date" /></div>
                            <div class="field"><label>Updated To</label><input type="date" /></div>
                        </div>
                    </div>

                    <div class="my-card">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Doc No</th>
                                        <th>Store</th>
                                        <th>Customer</th>
                                        <th>Product Group</th>
                                        <th>Last Updated</th>
                                        <th>Updated By</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="forecastBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="text-center text-muted small mt-4 mb-2">
                    © 2026 Dolfin — Distributor Portal
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>

    <script>
        // =========================
        // SESSION GUARD
        // =========================
        const sess = localStorage.getItem("dolfin_user");
        if (!sess) window.location.href = "login.html?role=distributor";
        const user = JSON.parse(sess);

        document.getElementById("userBtn").textContent = user.name || "User";
        document.getElementById("userInfo").textContent = `${user.email} • role=${user.role}`;

        document.getElementById("btnLogout").addEventListener("click", () => {
            localStorage.removeItem("dolfin_user");
            window.location.href = "index.html";
        });

        // =========================
        // SIDEBAR INJECTION
        // =========================
        document.addEventListener("DOMContentLoaded", () => {
            const sidebar = new SidebarSystem("distributor", "forecast");
            sidebar.render();
            renderForecastList();
        });

        // =========================
        // FORECAST LIST FROM STORAGE
        // =========================
        function renderForecastList() {
            const list = JSON.parse(localStorage.getItem('dolfin_forecast_list') || '[]');
            const tbody = document.getElementById('forecastBody');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:24px;color:#6b7280;">Belum ada data forecast.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(doc => {
                const badgeClass = doc.status === 'Active' ? 'badge-active' : 'badge-draft';
                const updated = doc.lastUpdated
                    ? new Date(doc.lastUpdated).toLocaleString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
                    : '-';
                return `<tr>
                    <td>${doc.docNo || '-'}</td>
                    <td>${doc.storeName || doc.store || '-'}</td>
                    <td>${doc.customerName || '-'}</td>
                    <td>${doc.groupName || doc.group || '-'}</td>
                    <td>${updated}</td>
                    <td>${doc.lastUpdatedBy || doc.createdBy || '-'}</td>
                    <td><span class="badge ${badgeClass}">${doc.status || 'Draft'}</span></td>
                    <td style="display:flex;gap:8px;">
                        <button onclick="window.location.href='distributor_forecastview.html'">View</button>
                        <button onclick="window.location.href='distributor_forecast.html'" class="primary">Copy</button>
                    </td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
